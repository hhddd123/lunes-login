name: lunes Auto Login

on:
  schedule:
    - cron: '0 12 * * 5'  # 每周五北京时间20时运行一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run login script
        env:
          ACCOUNTS_BATCH: ${{ secrets.ACCOUNTS_BATCH }}
          PYTHONIOENCODING: utf-8
        run: |
          python login.py

      # 📸 上传截图（无论成功或失败）
      - name: 📸 Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: op-screenshots
          path: screenshots/*.png

      # ⏱️ 提交 time.txt 到仓库
      - name: Commit time.txt to repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $timeStr = Get-Date -Format "yyyy-MM-dd HH:mm:ss"
          if (!(Test-Path time.txt)) {
            "首次生成时间：$timeStr" | Out-File -Encoding utf8 time.txt
          } else {
            $timeStr | Out-File -Encoding utf8 time.txt
          }

          git add time.txt

          $diff = git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            echo "无变化，无需提交"
          } else {
            git commit -m "⏱️ 更新时间文件: $timeStr"
            git push origin HEAD:main
          }
